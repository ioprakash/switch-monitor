---
# Playbook: SSH Health Check (via Ansible SSH connection)
- name: BDCOM Switch SSH Health Check
  hosts: bdcom_switches
  gather_facts: no

  tasks:
    - name: Check SSH status
      ansible.netcommon.cli_command:
        command: show ip ssh
      register: ssh_status

    - name: Show SSH status
      debug:
        var: ssh_status.stdout_lines

    - name: Get switch version
      ansible.netcommon.cli_command:
        command: show version
      register: version

    - name: Show version
      debug:
        var: version.stdout_lines

    - name: Get system info
      ansible.netcommon.cli_command:
        command: show system
      register: system
      ignore_errors: yes

    - name: Show system info
      debug:
        var: system.stdout_lines
      when: system is not failed

    - name: Check running-config for SSH
      ansible.netcommon.cli_command:
        command: show running-config
      register: config

    - name: Show SSH config lines
      debug:
        msg: "{{ config.stdout_lines | select('search', 'ssh|SSH|ip ssh') | list }}"
